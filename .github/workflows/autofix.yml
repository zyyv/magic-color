name: autofix.ci

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set node LTS ✨
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Dependencies 📦️
        run: pnpm i

      - name: Lint
        run: pnpm lint:fix

      - uses: autofix-ci/action@v1
