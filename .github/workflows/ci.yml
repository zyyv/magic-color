name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set node LTS ✨
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Dependencies 📦️
        run: pnpm i

      - name: Build
        run: pnpm build

      - name: Type Check
        run: pnpm test:attw

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node: [lts/*]
        os: ubuntu-latest
      fail-fast: false

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install Dependencies 📦️
        run: pnpm i

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
